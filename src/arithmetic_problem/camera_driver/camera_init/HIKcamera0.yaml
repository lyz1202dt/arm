%YAML:1.0
---
#实际帧率 = 1 / (曝光时间 + 读取时间)
#曝光 <= 1 / 实际帧率 - 读取时间 --不影响帧率，色调暗，需补光
#曝光 >= 1 / 实际帧率 - 读取时间 --影响帧率，色调亮


# USB(0)/hik(1)
camera_type: 1
#会过于精细，导致许多重要细节错过。


# 图像分辨率、帧率
# 160×120 320×240 640×480 864x800 1440 ×  
#                 656x496 
# 宽高设置时需考虑步进(16)，即设置宽高需16的倍数
base_info:
   weight: 864 # 默认(-1)为最大 min 32 max 1440 Inc 4  60 
   height: 800 # min 8 max 1080 Inc 4    49 
   fps: 100

# 海康相机额外信息
hik_info:
   camera_mode: 1 # 0：回调函数  1：主动取值
   exposure_time: 10000 # 曝光时间  15 - 9999813.000000 默认8000 10000

# 图像协议
pixel_format: 35127316 # PixelType_Gvsp_RGB8_Packed
fourcc: 0
index: 0

# 相机内参矩阵
camera_matrix: !!opencv-matrix
   rows: 3
   cols: 3
   dt: d
   data: [ 707.0175078202584, 0, 587.0166630521487,
           0, 708.9236964765086, 433.6934491526906,
           0, 0, 1 ]

# 相机畸变矩阵
dist_coeffs_matrix: !!opencv-matrix
   rows: 5
   cols: 1
   dt: d
   data: [ 0.08778956836724601, -0.10985182973642, -0.0005332066546966102,
           -0.00290581053887353, 0.04195928244750036 ]

# 相机位姿（坐标） 固定场景使用
RT:
   angle:
      yaw: 0
      pitch: 0
      roll: 0
   pos:
      x: 0
      y: 0
      z: 0